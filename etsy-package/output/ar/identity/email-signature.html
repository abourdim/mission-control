  .tagline { font-size: 13px; color: #cbd5e1; margin-top: 6px; line-height: 1.35; font-weight: 500; }
  .url { font-family: 'Orbitron', monospace; font-size: 11px; color: #94a3b8; letter-spacing: 0.05em; margin-top: 8px; }
